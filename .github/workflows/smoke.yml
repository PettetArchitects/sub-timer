name: smoke

# Routine app checks: runs the headless test suites on every PR and on pushes
# to non-main branches. Fails the run (and blocks merge, if required) on any
# failed check or unexpected console/page error. Screenshots from every suite
# are uploaded as an artifact for triage.
on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sanity (JS parse)
        run: npm run sanity

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test (core journeys)
        run: npm run smoke

      - name: Sports matrix (all formats)
        run: npm run sports

      - name: Edge cases (save/resume, subs, settings, boundaries)
        run: npm run edge

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots
          path: test/screenshots/
          if-no-files-found: ignore
          retention-days: 14
